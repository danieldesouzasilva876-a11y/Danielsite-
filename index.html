<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledilson Lanches</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

header{
  background:#ff8c00;
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.slogan{
  text-align:center;
  color:#ffd27a;
  padding:6px;
}

.aviso{
  background:#222;
  text-align:center;
  padding:10px;
  color:#ffb84d;
  font-weight:bold;
}

.container{padding:15px;}

.tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:15px;
}

.tab{
  background:#1c1c1c;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  white-space:nowrap;
}

.tab.active{
  background:#ff8c00;
}

.item{
  background:#1c1c1c;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#ff8c00;
  border:none;
  padding:6px 10px;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.desc{
  font-size:12px;
  color:#aaa;
}

.cart{
  background:#000;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  align-items:center;
}

.qty button{
  margin:0 3px;
  padding:4px 8px;
  background:#444;
}

.total{
  margin-top:10px;
  font-weight:bold;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

</style>
</head>

<body>

<header>🍔 Ledilson Lanches</header>
<div class="slogan">Prazer em lhe servir! LC 22:27</div>

<div class="aviso">⚠ APENAS RETIRADA NO LOCAL</div>

<div class="container">

<!-- ABAS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('simples')">Simples</div>
  <div class="tab" onclick="showTab('premium')">Premium</div>
  <div class="tab" onclick="showTab('hotdog')">Hot Dog</div>
  <div class="tab" onclick="showTab('bebidas')">Bebidas</div>
</div>

<!-- PRODUTOS -->
<div id="produtos"></div>

<!-- CARRINHO -->
<div class="cart">
<h3>🧾 Carrinho</h3>
<div id="cart"></div>

<div class="total" id="total">Total: R$ 0.00</div>

<h3>Finalizar Pedido</h3>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<select id="pagamento">
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select>

<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="send()">Enviar no WhatsApp</button>
</div>

</div>

<script>

let pedidoId = Math.floor(Math.random()*9000)+1000;

/* 🔥 CARDÁPIO */
let data = {

simples:[
{name:"Misto Quente",price:8,desc:"Presunto e queijo"},
{name:"Misto com Carne",price:12,desc:"Carne, presunto e queijo"},
{name:"Bauru",price:10,desc:"Completo tradicional"},
{name:"X-Egg",price:14,desc:"Ovo e vegetais"},
{name:"Americano",price:14,desc:"Salsicha e queijo"},
],

premium:[
{name:"X-Frango",price:22,desc:"Frango crocante"},
{name:"X-Bacon",price:26,desc:"Bacon e carne"},
{name:"X-Tudo",price:29,desc:"Tudo incluso"},
{name:"X-Tudo Turbo",price:39,desc:"Duplo + banana"},
{name:"X-Burguer",price:19,desc:"Carne e queijo"},
],

hotdog:[
{name:"Cachorrinho",price:15,desc:"Molho especial"},
{name:"Cachorrão",price:20,desc:"2 salsichas"},
],

bebidas:[
{name:"Coca Lata",price:6,desc:"350ml"},
{name:"Fanta Lata",price:6,desc:"350ml"},
{name:"Guaraná Lata",price:6,desc:"350ml"},
{name:"Refrigerante 2L",price:15,desc:"Vários sabores"},
]

};

let currentTab="simples";

let cart=[];

/* ABAS */
function showTab(tab){
currentTab=tab;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

renderProducts();
}

function renderProducts(){
let el=document.getElementById("produtos");
el.innerHTML="";

data[currentTab].forEach((p,i)=>{
el.innerHTML+=`
<div class="item">
<div>
<b>${p.name}</b> - R$ ${p.price}
<div class="desc">${p.desc}</div>
</div>

<button onclick="add('${p.name}',${p.price})">Adicionar</button>
</div>
`;
});
}

/* CARRINHO */
function add(name,price){

let item = cart.find(c=>c.name===name);

if(item){
item.qty++;
}else{
cart.push({name,price,qty:1});
}

renderCart();
}

function minus(i){
cart[i].qty--;
if(cart[i].qty<=0) cart.splice(i,1);
renderCart();
}

function plus(i){
cart[i].qty++;
renderCart();
}

function renderCart(){

let el=document.getElementById("cart");
el.innerHTML="";

let total=0;

cart.forEach((c,i)=>{
total+=c.price*c.qty;

el.innerHTML+=`
<div class="cart-item">
<div>
${c.name}<br>
R$ ${c.price} x ${c.qty}
</div>

<div class="qty">
<button onclick="minus(${i})">-</button>
<button onclick="plus(${i})">+</button>
</div>
</div>
`;
});

document.getElementById("total").innerText="Total: R$ "+total.toFixed(2);
}

/* WHATS */
function send(){

let nome=document.getElementById("nome").value;
let telefone=document.getElementById("telefone").value;
let pagamento=document.getElementById("pagamento").value;
let obs=document.getElementById("obs").value;

let msg=`🍔 *NOVO PEDIDO*\n🧾 Pedido Nº: ${pedidoId}\n\n`;
msg+=`👤 Nome: ${nome}\n📞 Telefone: ${telefone}\n💳 Pagamento: ${pagamento}\n\n`;
msg+=`📦 *Pedido:*\n`;

let total=0;

cart.forEach(c=>{
total+=c.price*c.qty;
msg+=`- ${c.name} - R$ ${(c.price*c.qty).toFixed(2)}\n`;
});

msg+=`\n💰 *Total: R$ ${total.toFixed(2)}*\n`;
msg+=`\n📝 Obs: ${obs}`;

let url="https://wa.me/5594992447611?text="+encodeURIComponent(msg);

window.open(url,"_blank");
}

/* INIT */
renderProducts();

</script>

</body>
</html>
