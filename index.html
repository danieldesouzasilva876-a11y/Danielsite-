<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledilson Lanches</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

header{
  background:#ff8c00;
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.container{padding:20px;}

h2{
  border-left:5px solid #ff8c00;
  padding-left:10px;
}

.item{
  background:#1c1c1c;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#ff8c00;
  border:none;
  padding:6px 10px;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.qty{
  display:flex;
  align-items:center;
  gap:8px;
}

.cart{
  background:#000;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
}

select,input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

.total{
  font-weight:bold;
  margin-top:10px;
}

</style>
</head>

<body>

<header>🍔 Ledilson Lanches</header>

<div class="container">

<h2>Cardápio</h2>

<div id="menu"></div>

<div class="cart">
<h3>🧾 Carrinho</h3>
<div id="cart"></div>

<div class="total" id="total">Total: R$ 0.00</div>

<h3>Finalizar Pedido</h3>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
</select>

<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="send()">Enviar no WhatsApp</button>

</div>

</div>

<script>

let pedidoId = Math.floor(Math.random()*9000)+1000;

let produtos = [
  {name:"Cachorrinho", price:10, type:"food"},
  {name:"Cachorrão", price:15, type:"food"},
  {name:"X-Burguer", price:19, type:"food"},
  {name:"X-Tudo", price:29, type:"food"},

  {name:"Coca-Cola Lata", price:5, type:"drink"},
  {name:"Guaraná Lata", price:5, type:"drink"},
  {name:"Fanta Lata", price:5, type:"drink"}
];

let cart = [];

function renderMenu(){
  let el = document.getElementById("menu");
  el.innerHTML = "";

  produtos.forEach((p,i)=>{
    el.innerHTML += `
      <div class="item">
        <div>
          ${p.name} - R$ ${p.price}
        </div>

        <button onclick="add(${i})">Adicionar</button>
      </div>
    `;
  });
}

function add(i){
  let p = produtos[i];

  let found = cart.find(c => c.name === p.name);

  if(found){
    found.qty++;
  } else {

    let item = {
      name:p.name,
      price:p.price,
      qty:1,
      extra:""
    };

    // SE FOR BEBIDA → escolher tipo
    if(p.type === "drink"){
      let escolha = prompt("Escolha: Coca / Fanta / Guaraná / Pepsi");
      item.extra = escolha || "";
    }

    cart.push(item);
  }

  renderCart();
}

function minus(index){
  cart[index].qty--;
  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }
  renderCart();
}

function plus(index){
  cart[index].qty++;
  renderCart();
}

function renderCart(){
  let el = document.getElementById("cart");
  el.innerHTML = "";

  let total = 0;

  cart.forEach((c,i)=>{
    total += c.price * c.qty;

    el.innerHTML += `
      <div class="item">
        <div>
          ${c.name} ${c.extra ? "("+c.extra+")" : ""}<br>
          R$ ${c.price.toFixed(2)} x ${c.qty}
        </div>

        <div class="qty">
          <button onclick="minus(${i})">-</button>
          <button onclick="plus(${i})">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);
}

function send(){

  let nome = document.getElementById("nome").value;
  let telefone = document.getElementById("telefone").value;
  let pagamento = document.getElementById("pagamento").value;
  let obs = document.getElementById("obs").value;

  let msg = `🍔 *NOVO PEDIDO*\n🧾 Pedido Nº: ${pedidoId}\n\n`;
  msg += `👤 Nome: ${nome}\n📞 Telefone: ${telefone}\n💳 Pagamento: ${pagamento}\n\n`;
  msg += `📦 *Pedido:*\n`;

  let total = 0;

  cart.forEach(c=>{
    total += c.price * c.qty;
    msg += `- ${c.name} ${c.extra ? "(" + c.extra + ")" : ""} - R$ ${(c.price*c.qty).toFixed(2)}\n`;
  });

  msg += `\n💰 *Total: R$ ${total.toFixed(2)}*\n`;
  msg += `\n📝 Obs: ${obs}`;

  let url = "https://wa.me/5594992447611?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}

renderMenu();

</script>

</body>
</html>
