<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledilson Lanches</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

header{
  background:#ff8c00;
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.slogan{
  text-align:center;
  color:#ffd27a;
  padding:5px;
}

.aviso{
  background:#222;
  text-align:center;
  padding:10px;
  color:#ffb84d;
  font-weight:bold;
}

.container{padding:15px;}

.tabs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:10px;
}

.tab{
  background:#1c1c1c;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  white-space:nowrap;
}

.tab.active{
  background:#ff8c00;
}

.item{
  background:#1c1c1c;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.desc{
  font-size:12px;
  color:#aaa;
  margin-top:4px;
}

button{
  background:#ff8c00;
  border:none;
  padding:6px 10px;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.cart{
  background:#000;
  padding:15px;
  margin-top:20px;
  border-radius:10px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:8px 0;
}

.qty button{
  background:#444;
  margin:0 3px;
  padding:4px 8px;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

.total{
  font-weight:bold;
  margin-top:10px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ff8c00;
  padding:10px 18px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<header>🍔 Ledilson Lanches</header>
<div class="slogan">Prazer em lhe servir! LC 22:27</div>

<div class="aviso">⚠ APENAS RETIRADA NO LOCAL</div>

<div class="container">

<!-- ABAS -->
<div class="tabs">
<div class="tab active" onclick="tab('simples',event)">Simples</div>
<div class="tab" onclick="tab('premium',event)">Premium</div>
<div class="tab" onclick="tab('hotdog',event)">Hot Dog</div>
<div class="tab" onclick="tab('bebidas',event)">Bebidas</div>
</div>

<div id="produtos"></div>

<div class="cart">
<h3>🧾 Carrinho</h3>
<div id="cart"></div>

<div id="drinkBox"></div>

<div class="total" id="total">Total: R$ 0.00</div>

<h3>Finalizar Pedido</h3>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

<select id="pagamento">
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select>

<textarea id="obs" placeholder="Observações"></textarea>

<button onclick="send()">Enviar no WhatsApp</button>
</div>

</div>

<div class="toast" id="toast">Produto adicionado ao carrinho</div>

<script>

let pedidoId = Math.floor(Math.random()*9000)+1000;

/* 🍔 CARDÁPIO COMPLETO */
let data = {

simples:[
{name:"X-Salada",price:19,desc:"Pão tostado, blend de carne, ovo, presunto, queijo, alface, tomate, milho e batata palha"},
{name:"X-Moda",price:19,desc:"Calabresa, salsicha, presunto, queijo, alface, tomate, milho e batata palha"},
{name:"X-Calabresa",price:17,desc:"Calabresa, ovo, presunto, queijo, alface, tomate, milho e batata palha"},
{name:"X-Egg",price:14,desc:"Ovo, presunto, queijo, alface, tomate, milho e batata palha"},
{name:"Americano",price:14,desc:"Presunto, queijo, salsicha, alface, tomate, milho e batata palha"},
{name:"Misto com Carne",price:12,desc:"Blend de carne, presunto e queijo"},
{name:"Bauru",price:10,desc:"Presunto, queijo, tomate, alface, milho e batata palha"},
{name:"Misto Quente",price:8,desc:"Presunto e queijo"}
],

premium:[
{name:"X-Tudo Turbo",price:39,desc:"2 carnes, bacon, 2 ovos, salsicha, calabresa, banana, 2 presuntos, 2 queijos, alface, tomate, milho e batata"},
{name:"X-Tudo",price:29,desc:"Carne, bacon, ovo, salsicha, calabresa, presunto, queijo, alface, tomate, milho e batata"},
{name:"X-Filé",price:27,desc:"Filé bovino, ovo, presunto, queijo, alface, tomate, milho e batata"},
{name:"X-Bacon",price:26,desc:"Bacon, carne, presunto, queijo, alface, tomate, milho e batata"},
{name:"Calabresa Burguer",price:23,desc:"Carne, calabresa, ovo, presunto, queijo, alface, tomate, milho e batata"},
{name:"X-Frango",price:22,desc:"Frango crocante, ovo, presunto, queijo, alface, tomate, milho e batata"},
{name:"American Burguer",price:22,desc:"Carne, presunto, salsicha, queijo, alface, tomate, milho e batata"},
{name:"X-Burguer",price:19,desc:"Carne, presunto, queijo, alface, tomate, milho e batata"}
],

hotdog:[
{name:"Cachorrão",price:20,desc:"2 salsichas, molho especial, uva passa, maionese verde, ketchup, parmesão, milho e batata palha"},
{name:"Cachorrinho",price:15,desc:"Salsicha, molho especial, uva passa, maionese verde, ketchup, parmesão, milho e batata palha"}
],

bebidas:[
{name:"Refrigerante 2L",price:15,desc:"Coca-Cola, Fanta, Guaraná, Pepsi"},
{name:"Refrigerante 1L",price:10,desc:"Coca-Cola ou Guaraná"},
{name:"Coca-Cola Lata",price:6,desc:"350ml"},
{name:"Fanta Lata",price:6,desc:"350ml"},
{name:"Guaraná Lata",price:6,desc:"350ml"},
{name:"Pepsi Lata",price:6,desc:"350ml"}
]

};

let current="simples";
let cart=[];

/* ABA */
function tab(t,e){
current=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
e.target.classList.add("active");
render();
}

/* ✔ CORREÇÃO DEFINITIVA DA ORDEM */
function sort(arr){
return [...arr].sort((a,b)=>b.price-a.price);
}

/* PRODUTOS */
function render(){
let el=document.getElementById("produtos");
el.innerHTML="";

sort(data[current]).forEach(p=>{
el.innerHTML+=`
<div class="item">
<div>
<b>${p.name}</b> - R$ ${p.price}
<div class="desc">${p.desc}</div>
</div>

<button onclick="add('${p.name}',${p.price},'${current}')">Adicionar</button>
</div>
`;
});
}

/* CARRINHO */
function add(name,price,type){

let item=cart.find(c=>c.name===name);

if(item){
item.qty++;
}else{

let obj={name,price,qty:1,drink:null};

if(type==="bebidas"){
obj.drink="";
}

cart.push(obj);
}

renderCart();
toast();
}

function minus(i){
cart[i].qty--;
if(cart[i].qty<=0) cart.splice(i,1);
renderCart();
}

function plus(i){
cart[i].qty++;
renderCart();
}

/* CARRINHO */
function renderCart(){

let el=document.getElementById("cart");
el.innerHTML="";

let total=0;
let hasDrink=false;

cart.forEach((c,i)=>{

total+=c.price*c.qty;

if(data.bebidas.find(b=>b.name===c.name)){
hasDrink=true;
}

el.innerHTML+=`
<div class="cart-item">
<div>
${c.name}<br>
R$ ${c.price} x ${c.qty}
</div>

<div class="qty">
<button onclick="minus(${i})">-</button>
<button onclick="plus(${i})">+</button>
</div>
</div>
`;
});

let drinkBox=document.getElementById("drinkBox");
drinkBox.innerHTML="";

if(hasDrink){
drinkBox.innerHTML=`
<h4>🥤 Escolha o sabor da bebida</h4>
<select id="drinkChoice">
<option>Coca-Cola</option>
<option>Fanta</option>
<option>Guaraná</option>
<option>Pepsi</option>
</select>
`;
}

document.getElementById("total").innerText="Total: R$ "+total.toFixed(2);
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1200);
}

/* WHATS */
function send(){

let nome=document.getElementById("nome").value;
let telefone=document.getElementById("telefone").value;
let pagamento=document.getElementById("pagamento").value;
let obs=document.getElementById("obs").value;

let drink=document.getElementById("drinkChoice")
?document.getElementById("drinkChoice").value
:"Nenhuma";

let msg=`🍔 *NOVO PEDIDO*\n🧾 Pedido Nº: ${pedidoId}\n\n`;
msg+=`👤 Nome: ${nome}\n📞 Telefone: ${telefone}\n💳 Pagamento: ${pagamento}\n\n`;
msg+=`📦 *Pedido:*\n`;

let total=0;

cart.forEach(c=>{
total+=c.price*c.qty;
msg+=`- ${c.name} x${c.qty} - R$ ${(c.price*c.qty).toFixed(2)}\n`;
});

msg+=`\n🥤 Bebida: ${drink}`;
msg+=`\n💰 Total: R$ ${total.toFixed(2)}`;
msg+=`\n📝 Obs: ${obs}`;

let url="https://wa.me/5594992447611?text="+encodeURIComponent(msg);

window.open(url,"_blank");
}

render();

</script>

</body>
</html>
